version: '3.9'

services:
  transcript-exporter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: youtube-transcript-exporter
    environment:
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      NOTION_TOKEN: ${NOTION_TOKEN:-}
      LOG_LEVEL: INFO
    volumes:
      # Mount data directories for persistence
      - ./out:/app/out
      - ./markdown:/app/markdown
      - ./db:/app/db
      - ./logs:/app/logs
    working_dir: /app
    # Override default command if needed
    # command: python3 system_health_check.py
    # Interactive mode (useful for development)
    stdin_open: true
    tty: true
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '2'
          memory: 2G
    # Restart policy
    restart: unless-stopped

# Named volumes for data persistence
volumes:
  transcript-data:
    driver: local

# Network for inter-service communication
networks:
  default:
    name: transcript-exporter-network
    driver: bridge
