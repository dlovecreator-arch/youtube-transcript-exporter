name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-test:
    name: Lint + smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pyyaml

      - name: Bash syntax check
        run: bash -n export.sh tests/smoke_test.sh tests/build_fixture.sh

      - name: Lint Python for hard errors
        run: |
          ruff check src/ ytx/ ytexporter/ tools/ tests/ --select=E9,F63,F7,F82 --output-format=github

      - name: ytx smoke test
        run: bash tests/smoke_test.sh

      - name: Legacy wrapper smoke tests
        run: |
          ./export.sh --help
          python -m ytexporter version
          python -m ytexporter health || true

      - name: Unit tests
        run: python3 tests/test_all.py
