<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Decorative grid lines -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.6">
    <line x1="0" y1="60"  x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
  </g>

  <!-- Floating data nodes (channels) -->
  <g filter="url(#glow)" opacity="0.85">
    <circle cx="120" cy="80"  r="6" fill="#7c3aed"/>
    <circle cx="200" cy="220" r="5" fill="#ec4899"/>
    <circle cx="80"  cy="180" r="4" fill="#f59e0b"/>
    <circle cx="1080" cy="90" r="6" fill="#7c3aed"/>
    <circle cx="1000" cy="220" r="5" fill="#ec4899"/>
    <circle cx="1100" cy="180" r="4" fill="#f59e0b"/>
  </g>

  <!-- Connection lines between nodes (representing cross-channel links) -->
  <g stroke="#7c3aed" stroke-width="0.8" opacity="0.35" fill="none">
    <path d="M120,80 Q400,40 1080,90"/>
    <path d="M200,220 Q600,260 1000,220"/>
    <path d="M80,180 Q500,150 1100,180"/>
  </g>

  <!-- Title -->
  <text x="600" y="130" text-anchor="middle"
        font-family="ui-sans-serif, -apple-system, Helvetica, Arial"
        font-size="56" font-weight="800" fill="url(#accent)">
    YouTube Transcript Exporter
  </text>

  <!-- Subtitle -->
  <text x="600" y="175" text-anchor="middle"
        font-family="ui-sans-serif, -apple-system, Helvetica, Arial"
        font-size="20" font-weight="500" fill="#cbd5e1">
    Bulk-download channel transcripts -- build an Obsidian / Notion second brain
  </text>

  <!-- Pill badges -->
  <g font-family="ui-monospace, Menlo, monospace" font-size="13" font-weight="600">
    <g transform="translate(420,210)">
      <rect width="140" height="30" rx="15" fill="#1e293b" stroke="#7c3aed"/>
      <text x="70" y="20" text-anchor="middle" fill="#a78bfa">yt-dlp powered</text>
    </g>
    <g transform="translate(575,210)">
      <rect width="120" height="30" rx="15" fill="#1e293b" stroke="#ec4899"/>
      <text x="60" y="20" text-anchor="middle" fill="#f472b6">Obsidian-ready</text>
    </g>
    <g transform="translate(710,210)">
      <rect width="100" height="30" rx="15" fill="#1e293b" stroke="#f59e0b"/>
      <text x="50" y="20" text-anchor="middle" fill="#fbbf24">Notion sync</text>
    </g>
  </g>
</svg>
